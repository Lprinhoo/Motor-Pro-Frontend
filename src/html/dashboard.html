<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Pro CRM — Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <!-- Adicionada a importação direta da fonte Tabler Icons via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="dashboard-body">

<div class="db-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sb-logo">
            <div class="sb-logo-mark">
                <span class="sb-logo-dot"></span>
            </div>
            <h1>MOTOR PRO <span>CRM</span></h1>
        </div>

        <div class="sb-oficina">
            <div class="sb-oficina-avatar" id="sbOficinaAvatar">M</div>
            <div class="sb-oficina-info">
                <div class="sb-oficina-label">OFICINA ATIVA</div>
                <div class="sb-oficina-name" id="sbOficinaName">Carregando...</div>
            </div>
        </div>

        <nav class="sb-nav">
            <div class="nav-section">PRINCIPAL</div>
            <div class="nav-item active" data-page="dashboard">
                <i class="ti ti-layout-dashboard"></i><span>Dashboard</span>
            </div>
            <div class="nav-item" data-page="clientes">
                <i class="ti ti-users"></i><span>Clientes</span>
            </div>
            <div class="nav-item" data-page="ordens">
                <i class="ti ti-clipboard-list"></i><span>Ordens de Serviço</span>
                <span class="nav-badge">12</span>
            </div>

            <div class="nav-section">GESTÃO</div>
            <div class="nav-item" data-page="veiculos">
                <i class="ti ti-car"></i><span>Veículos</span>
            </div>
            <div class="nav-item" data-page="relatorios">
                <i class="ti ti-chart-bar"></i><span>Relatórios</span>
            </div>

            <div class="nav-section">SISTEMA</div>
            <div class="nav-item" data-page="configuracoes">
                <i class="ti ti-settings"></i><span>Configurações</span>
            </div>
        </nav>

        <div class="sb-bottom">
            <button class="btn-logout" id="logoutBtn">
                <i class="ti ti-logout"></i> SAIR DO SISTEMA
            </button>
        </div>
    </aside>

    <!-- Conteúdo principal -->
    <main class="db-content">
        <header class="top-bar">
            <div>
                <div class="page-eyebrow">VISÃO GERAL</div>
                <h2 class="page-title">Serviços da Oficina</h2>
                <div class="page-subtitle">Gerencie os serviços oferecidos pela sua oficina.</div>
            </div>
            <div class="top-bar-actions">
                <div class="search-box">
                    <i class="ti ti-search"></i>
                    <input type="text" placeholder="Buscar serviço...">
                    <kbd>⌘K</kbd>
                </div>
                <!-- Botão de notificação removido -->
            </div>
        </header>

        <!-- Painéis de Serviços da Oficina -->
        <section class="panel">
            <div class="panel-title-group">
                <div>
                    <div class="panel-title">SERVIÇOS DISPONÍVEIS</div>
                    <div class="panel-hint">Catálogo de serviços que sua oficina oferece.</div>
                </div>
                <div class="panel-actions">
                    <button class="btn-action ghost" id="editServicesBtn">
                        <i class="ti ti-edit"></i> Editar
                    </button>
                    <button class="btn-action primary" id="addServiceBtn">
                        <i class="ti ti-plus"></i> Novo Serviço
                    </button>
                </div>
            </div>
            <div id="servicePanelsContainer" class="service-panels-grid">
                <!-- Os painéis de serviço serão renderizados aqui pelo JavaScript -->
            </div>
        </section>
    </main>
</div>

<!-- Pop-up -->
<div id="popup-overlay" class="hidden">
    <div id="popup-card">
        <h3 id="popup-title"></h3>
        <p id="popup-message"></p>
        <button id="popup-close-btn">OK</button>
    </div>
</div>

<script src="../js/dashboard.js"></script>
</body>
</html>
