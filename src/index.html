<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Pro Gerenciamento - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>MOTOR PRO <span>GERENCIAMENTO</span></h1>
    </header>

    <main>
        <div class="card login-card" id="auth-card">
            <h2 id="auth-title">LOGIN</h2>

            <form id="login-form">

                <!-- Campo de usuário (visível sempre) -->
                <div class="input-group" id="username-group">
                    <label for="username" id="username-label">USUÁRIO</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required>
                </div>

                <!-- Campo de email (visível só no cadastro) -->
                <div class="input-group hidden" id="email-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" placeholder="Digite seu email">
                </div>

                <div class="input-group" id="password-group">
                    <label for="password">SENHA</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>

                <div class="input-group hidden" id="confirm-password-group">
                    <label for="confirm-password">CONFIRMAR SENHA</label>
                    <input type="password" id="confirm-password" placeholder="Confirme sua senha">
                </div>

                <button type="submit" id="btn-auth">ACESSAR SISTEMA</button>
            </form>

            <div class="auth-footer">
                <p id="toggle-text">Não tem uma conta? <span id="toggle-auth">Cadastre-se</span></p>
                <p class="forgot-password" id="forgot-pass">Esqueceu sua senha?</p>
            </div>
        </div>
    </main>

    <!-- Pop-up de Mensagens (já existente) -->
    <div id="popup-overlay" class="hidden">
        <div id="popup-card">
            <h3 id="popup-title"></h3>
            <p id="popup-message"></p>
            <button id="popup-close-btn">OK</button>
        </div>
    </div>

    <!-- Novo Pop-up para Redefinir Senha -->
    <div id="forgot-password-overlay" class="hidden">
        <div id="forgot-password-card" class="card login-card">
            <h2>REDEFINIR SENHA</h2>
            <form id="forgot-password-form">
                <div class="input-group">
                    <label for="forgot-email">EMAIL</label>
                    <input type="email" id="forgot-email" placeholder="Digite seu email" required>
                </div>
                <button type="submit">ENVIAR LINK DE REDEFINIÇÃO</button>
                <button type="button" id="forgot-password-cancel" class="btn-secondary">CANCELAR</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
